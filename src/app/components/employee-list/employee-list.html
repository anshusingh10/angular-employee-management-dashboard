<div class="max-w-6xl mx-auto mt-10">

<!-- Header -->
<div class="flex justify-between items-center mb-6">

<h2 class="text-3xl font-bold text-gray-800">
Employee List
</h2>

<button
 class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg shadow transition"
 routerLink="/add"
>
+ Add Employee
</button>

</div>

<!-- Search -->
<div class="mb-6 flex gap-3">

<input
 type="text"
 placeholder="Search employee..."
 [(ngModel)]="searchText"
 (input)="searchEmployee()"
 class="w-full border p-3 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
/>

<button
 class="bg-blue-600 hover:bg-blue-700 text-white px-6 rounded-lg"
 (click)="searchEmployee()"
>
Search
</button>

</div>

<!-- Table -->
<div class="bg-white shadow-xl rounded-xl overflow-hidden">

<table class="w-full">

<thead class="bg-gray-100 text-gray-700">
<tr>
<th class="p-4 text-left">Employee</th>
<th class="p-4 text-left">Email</th>
<th class="p-4 text-left">Department</th>
<th class="p-4 text-left">Actions</th>
</tr>
</thead>

<tbody>

<tr
 *ngFor="let emp of filteredEmployees"
 class="border-t hover:bg-gray-50 transition duration-200"
>

<!-- Employee -->
<td class="p-4 flex items-center gap-3">

<div class="w-10 h-10 bg-blue-500 text-white flex items-center justify-center rounded-full font-bold">
{{ emp.name.charAt(0) }}
</div>

<span class="font-medium text-gray-800">
{{ emp.name }}
</span>

</td>

<!-- Email -->
<td class="p-4 text-gray-600">
{{ emp.email }}
</td>

<!-- Department -->
<td class="p-4">
<span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-sm">
{{ emp.department }}
</span>
</td>

<!-- Actions -->
<td class="p-4 flex gap-2">
<button
 class="bg-green-500 hover:bg-green-600 text-white px-3 py-1 rounded"
 [routerLink]="['/edit', emp.id]"
>
Edit
</button>

<button
 class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded"
 (click)="deleteEmployee(emp.id)"
>
Delete
</button>

</td>

</tr>

<!-- No Data Message -->
<tr *ngIf="filteredEmployees.length === 0">
<td colspan="4" class="text-center p-6 text-gray-500">
No employees found
</td>
</tr>

</tbody>

</table>

</div>

</div>
